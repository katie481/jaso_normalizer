<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>자소분리 복원기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }
  h1 { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
  textarea {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid #e0e0e0; border-radius: 10px;
    font-size: 14px; font-family: inherit;
    resize: vertical; min-height: 80px; color: #1a1a1a;
    transition: border-color 0.2s; outline: none;
  }
  textarea:focus { border-color: #5b5ef4; }
  .arrow { text-align: center; font-size: 20px; margin: 14px 0; color: #bbb; }
  .result-box {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid #e0e0e0; border-radius: 10px;
    font-size: 14px; background: #fafafa;
    min-height: 80px; color: #1a1a1a;
    word-break: break-all; white-space: pre-wrap; line-height: 1.6;
  }
  .result-box.has-content { border-color: #5b5ef4; background: #f4f4ff; }
  .btn-row { display: flex; gap: 10px; margin-top: 14px; }
  button {
    flex: 1; padding: 11px; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  button:active { transform: scale(0.97); }
  .btn-copy { background: #5b5ef4; color: white; }
  .btn-copy:hover { background: #4a4de0; }
  .btn-clear { background: #f0f0f0; color: #555; }
  .btn-clear:hover { background: #e4e4e4; }
  .status { font-size: 12px; color: #5b5ef4; margin-top: 8px; min-height: 18px; text-align: right; font-weight: 600; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 99px; margin-top: 6px; font-weight: 600; }
  .tag-ok  { background: #e4e4ff; color: #5b5ef4; }
  .tag-nfd { background: #ffe4e4; color: #c0392b; }

  /* 토스트 */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1a1a;
    color: white;
    padding: 12px 22px;
    border-radius: 99px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div class="card">
  <h1>🔧 자소분리 복원기</h1>
  <p class="subtitle">붙여넣기만 하면 자동 변환 + 자동 복사</p>

  <label>깨진 파일명 붙여넣기 (Ctrl+V)</label>
  <textarea id="input" placeholder="여기에 붙여넣으세요 — 자동으로 변환 & 복사됩니다"></textarea>

  <div class="arrow">↓</div>

  <label>복원된 파일명 <span id="tag-out"></span></label>
  <div class="result-box" id="output">변환 결과가 여기에 표시됩니다</div>

  <div class="btn-row">
    <button class="btn-copy" onclick="copyResult()">📋 다시 복사</button>
    <button class="btn-clear" onclick="clearAll()">🗑 지우기</button>
  </div>
  <div class="status" id="status"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const inputEl  = document.getElementById('input');
  const outputEl = document.getElementById('output');
  const tagEl    = document.getElementById('tag-out');
  const statusEl = document.getElementById('status');
  const toastEl  = document.getElementById('toast');

  let toastTimer = null;

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
  }

  function convert(raw) {
    if (!raw.trim()) {
      outputEl.textContent = '변환 결과가 여기에 표시됩니다';
      outputEl.classList.remove('has-content');
      tagEl.innerHTML = '';
      statusEl.textContent = '';
      return null;
    }
    const normalized = raw.normalize('NFC');
    outputEl.textContent = normalized;
    outputEl.classList.add('has-content');

    if (normalized === raw) {
      tagEl.innerHTML = '<span class="tag tag-ok">✓ 이미 정상 (NFC)</span>';
      statusEl.textContent = '자소분리 없음 — 그대로 사용하세요';
    } else {
      tagEl.innerHTML = '<span class="tag tag-nfd">NFD → NFC 변환됨</span>';
      const before = [...raw].length;
      const after  = [...normalized].length;
      statusEl.textContent = `글자 수: ${before}자 → ${after}자 (${before - after}자 결합)`;
    }
    return normalized;
  }

  function copyResult() {
    const text = outputEl.textContent;
    if (!text || text === '변환 결과가 여기에 표시됩니다') return;
    navigator.clipboard.writeText(text).then(() => showToast('📋 복사됨!'));
  }

  function clearAll() {
    inputEl.value = '';
    convert('');
  }

  // 붙여넣기 이벤트: 변환 후 자동 복사
  inputEl.addEventListener('paste', (e) => {
    // 브라우저가 붙여넣기를 처리하도록 잠깐 기다린 후 실행
    setTimeout(() => {
      const raw = inputEl.value;
      const result = convert(raw);
      if (result !== null) {
        navigator.clipboard.writeText(result).then(() => {
          if (result !== raw) {
            showToast('✅ 변환 완료 — 클립보드에 복사됨!');
          } else {
            showToast('📋 정상 텍스트 — 클립보드에 복사됨!');
          }
        });
      }
    }, 0);
  });

  // 수동 입력에도 변환은 유지
  inputEl.addEventListener('input', () => convert(inputEl.value));
</script>
</body>
</html>
